name: VoltDB CI and Release

on:
  push:
    branches: [ "main", "master" ]
    tags:
      - 'v*'
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up JDK 8
      uses: actions/setup-java@v4
      with:
        java-version: '8'
        distribution: 'temurin'

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y ant cmake python3 build-essential

    - name: Build Java frontend
      run: ant

    - name: Build C++ engine (Release)
      run: python3 tools/build_cmake.py --build-type=release

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up JDK 8
      uses: actions/setup-java@v4
      with:
        java-version: '8'
        distribution: 'temurin'

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y ant cmake python3 build-essential

    - name: Build Java frontend
      run: ant

    - name: Build C++ engine (Release)
      run: python3 tools/build_cmake.py --build-type=release

    - name: Prepare Release Artifact
      id: prepare_artifact
      run: |
        VERSION=$(echo ${{ github.ref }} | sed -e "s/refs\/tags\/v//")
        ARTIFACT_DIR="voltdb-release-$VERSION"
        mkdir -p $ARTIFACT_DIR/voltdb
        cp -r bin examples lib tools version.txt $ARTIFACT_DIR/
        cp -r voltdb/* $ARTIFACT_DIR/voltdb/
        cp obj/release/ee/libvoltdb-*.so $ARTIFACT_DIR/voltdb/
        cp obj/release/ee/voltdbipc $ARTIFACT_DIR/voltdb/
        tar -czf "voltdb-release-$VERSION.tar.gz" $ARTIFACT_DIR
        echo "::set-output name=version::$VERSION"
        echo "::set-output name=artifact_name::voltdb-release-$VERSION.tar.gz"

    - name: Create GitHub Release
      id: create_release
      uses: actions/create-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ github.ref }}
        release_name: Release ${{ steps.prepare_artifact.outputs.version }}
        draft: false
        prerelease: false

    - name: Upload Release Asset
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ steps.create_release.outputs.upload_url }}
        asset_path: ${{ steps.prepare_artifact.outputs.artifact_name }}
        asset_name: ${{ steps.prepare_artifact.outputs.artifact_name }}
        asset_content_type: application/gzip
